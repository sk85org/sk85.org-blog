<!doctype html><html lang=ja xmlns=http://www.w3.org/1999/xhtml><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><link rel=icon href=favicon.svg type=image/svg+xml><title>search</title><link rel=stylesheet href=/css/style.css><link rel=stylesheet href=/css/font.css></head><body><header><a href=/ title=top><span class=menu>top</span></a>&nbsp;<a href=/archives/ title=archives><span class=menu>archives</span></a>&nbsp;<a href=/tags/ title=tags><span class=menu>tags</span></a>&nbsp;<a href=/about/ title=about><span class=menu>about</span></a>&nbsp;<a href=https://memos.sk85.org title=memos><span class=menu>memos</span></a>&nbsp;<a href=/search/ title=search><span class=menu>search</span></a>&nbsp;</header><h1 class=title>d.sk85.org</h1><div><div id=searchbox></div><div id=refinement-list></div><div id=sort-by></div><div id=hits></div></div><script src=https://cdn.jsdelivr.net/npm/@meilisearch/instant-meilisearch/dist/instant-meilisearch.umd.min.js></script><script src=https://cdn.jsdelivr.net/npm/instantsearch.js@4></script><script src=/search.js></script><input type=text id=search-input placeholder=ファイル名で検索... autocomplete=off><div id=status class=info></div><ul id=result-list></ul><script>const searchInput=document.getElementById("search-input"),resultList=document.getElementById("result-list"),statusLabel=document.getElementById("status");let timeoutId=null;searchInput.addEventListener("input",()=>{const e=searchInput.value.trim();if(clearTimeout(timeoutId),!e){resultList.innerHTML="",statusLabel.textContent="";return}timeoutId=setTimeout(()=>{executeSearch(e)},300)});async function executeSearch(e){statusLabel.textContent="検索中...";try{const n=`https://img.sk85.org/api/search?filename=${encodeURIComponent(e)}`,t=await fetch(n);if(!t.ok)throw new Error("通信エラー");const s=await t.json();renderResults(s)}catch(e){statusLabel.textContent="エラーが発生しました",console.error(e)}}function renderResults(e){resultList.innerHTML="";const t=e.results||[];statusLabel.textContent=`該当: ${e.total||0}件`,t.forEach(e=>{const t=document.createElement("li");t.textContent=e.filename,resultList.appendChild(t)})}</script><footer></footer></body></html>
