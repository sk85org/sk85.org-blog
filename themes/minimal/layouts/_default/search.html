{{ define "main" }}
  <h1 class="title">{{ .Site.Title }}</h1>
  
  <div>
    <div id="searchbox"></div>
    <div id="refinement-list"></div>
    <div id="sort-by"></div>
    <div id="hits"></div>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/@meilisearch/instant-meilisearch/dist/instant-meilisearch.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/instantsearch.js@4"></script>
    <script src="{{ "search.js" | relURL }}"/></script>
        <input type="text" id="search-input" placeholder="ファイル名で検索..." autocomplete="off">
    <div id="status" class="info"></div>
    <ul id="result-list"></ul>

    <script>
        const searchInput = document.getElementById('search-input');
        const resultList = document.getElementById('result-list');
        const statusLabel = document.getElementById('status');

        let timeoutId = null;

        // 入力イベントの監視
        searchInput.addEventListener('input', () => {
            const query = searchInput.value.trim();

            // 以前のタイマーをクリア（デバウンス処理）
            clearTimeout(timeoutId);

            if (!query) {
                resultList.innerHTML = '';
                statusLabel.textContent = '';
                return;
            }

            // 300ms間入力が止まったら検索実行
            timeoutId = setTimeout(() => {
                executeSearch(query);
            }, 300);
        });

        async function executeSearch(query) {
            statusLabel.textContent = '検索中...';
            
            try {
                const url = `https://img.sk85.org/api/search?filename=${encodeURIComponent(query)}`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error('通信エラー');

                const data = await response.json();
                renderResults(data);
            } catch (error) {
                statusLabel.textContent = 'エラーが発生しました';
                console.error(error);
            }
        }

        function renderResults(data) {
            resultList.innerHTML = '';
            const results = data.results || [];
            
            statusLabel.textContent = `該当: ${data.total || 0}件`;

            results.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item.filename;
                resultList.appendChild(li);
            });
        }
    </script>
{{ end }}
